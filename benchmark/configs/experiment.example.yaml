experiment:
  name: volleyball_dfine_vs_rtdetr
  seed_list: [0, 1, 2]

dataset:
  train_images: C:/data/volleyball/images/train
  val_images: C:/data/volleyball/images/val
  test_images: C:/data/volleyball/images/test
  train_ann: C:/data/volleyball/annotations/train.json
  val_ann: C:/data/volleyball/annotations/val.json
  test_ann: C:/data/volleyball/annotations/test.json
  num_classes: 1
  class_names: [volleyball]

models:
  dfine:
    train_repo: third_party/D-FINE
    config: configs/dfine/custom/dfine_hgnetv2_n_custom.yml
    pretrained: ""  # optional
  rtdetr_ultralytics:
    model: rtdetr-l.pt
    data_yaml: C:/data/volleyball/volleyball.yaml
  rtdetr_lyu:
    train_repo: third_party/RT-DETR/rtdetrv2_pytorch
    config: configs/rtdetrv2/rtdetrv2_r18vd_120e_coco.yml
    pretrained: ""  # optional

runtime:
  device: 0
  imgsz: 640
  batch: 8
  epochs: 120
  workers: 8
  amp: true

metrics:
  small_area_ratio: 0.01
  iou_thr: 0.5
  blur_levels: [clear, mild, heavy]
  min_track_len: 8
