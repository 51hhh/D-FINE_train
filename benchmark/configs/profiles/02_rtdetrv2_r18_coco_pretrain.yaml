# 组合A（主对比-轻量）: RT-DETRv2-R18，预训练微调
stage: "A_baseline"
purpose: "轻量预训练基线，用于与 01 对比"
compare_with: "01_dfine_n_coco_pretrain.yaml"
next_if_better: "进入 04 或 22，验证放大模型收益"
profile_name: rtdetrv2_r18_coco_pretrain
model_type: rtdetr_lyu
repo_dir: third_party/RT-DETR/rtdetrv2_pytorch
base_config: configs/rtdetrv2/rtdetrv2_r18vd_120e_coco.yml
epochs: 120
seed: 0
device: "0"
use_amp: true
pretrained: "benchmark/pretrained/rtdetr/rtdetrv2_r18vd_120e_coco_rerun_48.1.pth" # 已下载
output_group: pairA_rtdetr_r18_pretrain
overrides:
  PResNet.pretrained: true
  train_dataloader.total_batch_size: 8
  val_dataloader.total_batch_size: 8
  train_dataloader.num_workers: 4
  val_dataloader.num_workers: 4
  train_dataloader.collate_fn.scales:
    - 640
  train_dataloader.dataset.transforms.policy.epoch: 0
  train_dataloader.collate_fn.stop_epoch: 0
  sync_bn: false
