# 组合A（主对比-轻量）: D-FINE-N，使用官方COCO训练链路并从预训练权重微调
stage: "A_baseline"
purpose: "轻量预训练基线，用于与 02 对比"
compare_with: "02_rtdetrv2_r18_coco_pretrain.yaml"
next_if_better: "进入 03 或 21，验证放大模型收益"
profile_name: dfine_n_coco_pretrain
model_type: dfine
repo_dir: third_party/D-FINE
base_config: configs/dfine/custom/dfine_hgnetv2_n_custom.yml
seed: 0
device: "0"
use_amp: true
pretrained: "benchmark/pretrained/dfine/dfine_n_coco.pth" # 已下载
output_group: pairA_dfine_n_pretrain
overrides:
  HGNetv2.pretrained: true
  train_dataloader.total_batch_size: 8
  val_dataloader.total_batch_size: 8
  train_dataloader.num_workers: 4
  val_dataloader.num_workers: 4
  sync_bn: false
  train_dataloader.dataset.transforms.policy.epoch: 0
  train_dataloader.collate_fn.stop_epoch: 9999
