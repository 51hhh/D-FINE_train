# 单目标 volleyball：N 模型轻量方案（边缘优先，速度优先）
# 说明：
# 1) 该配置为小模型快速基线，输入降到 512 以提升吞吐
# 2) 推荐在命令行配合 -t 使用迁移权重（如你已有可用 N 权重）
# 用法（在 D-FINE 目录下）：
# python train.py -c ../config/volleyball_n_transfer_fast.yml --use-amp --seed 0

__include__: [
  '../D-FINE/configs/dfine/custom/dfine_hgnetv2_n_custom.yml',
]

# 输出目录（相对 D-FINE）
output_dir: ./output/exp_n_transfer_fast

# 数据集（单类别）
num_classes: 1
remap_mscoco_category: False

# 训练轮次：边缘部署场景先快速收敛
epochs: 120
checkpoint_freq: 5

# 输入尺寸下调到 512，降低延迟
eval_spatial_size: [512, 512]

train_dataloader:
  total_batch_size: 64
  dataset:
    img_folder: C:/Users/Rick/Desktop/python/ObjectDetection/coco/images
    ann_file: C:/Users/Rick/Desktop/python/ObjectDetection/coco/converted/annotations/train.json
    transforms:
      ops:
        - {type: RandomPhotometricDistort, p: 0.5}
        - {type: RandomZoomOut, fill: 0}
        - {type: RandomIoUCrop, p: 0.8}
        - {type: SanitizeBoundingBoxes, min_size: 1}
        - {type: RandomHorizontalFlip}
        - {type: Resize, size: [512, 512], }
        - {type: SanitizeBoundingBoxes, min_size: 1}
        - {type: ConvertPILImage, dtype: 'float32', scale: True}
        - {type: ConvertBoxes, fmt: 'cxcywh', normalize: True}
  collate_fn:
    base_size: 512

val_dataloader:
  total_batch_size: 128
  dataset:
    img_folder: C:/Users/Rick/Desktop/python/ObjectDetection/coco/images
    ann_file: C:/Users/Rick/Desktop/python/ObjectDetection/coco/converted/annotations/val.json
    transforms:
      ops:
        - {type: Resize, size: [512, 512], }
        - {type: ConvertPILImage, dtype: 'float32', scale: True}
