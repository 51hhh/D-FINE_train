# obj2coco pretrained, negative images (A) + DN random background queries (D)
# + bg_loss_weight=2.0（背景 VFL loss 权重 x2）+ eval_overactivation 训练中评估
# 用法（在 D-FINE 目录下执行）：
# python train.py -c ../config/volleyball_s_obj2coco_neg_d_bg2.yml --use-amp --seed 0 -t weights/dfine_s_obj2coco.pth

__include__: [
  '../D-FINE/configs/dfine/custom/objects365/dfine_hgnetv2_s_obj2custom.yml',
]

output_dir: ./output/exp_s_obj2coco_neg_d_bg2

num_classes: 1
remap_mscoco_category: False

# ============ Method D: DN random background queries ============
DFINETransformer:
  num_neg_random: 100
  neg_iou_threshold: 0.2

# ============ 背景 loss 权重（放大背景查询的 VFL loss 梯度）============
DFINECriterion:
  bg_loss_weight: 2.0

# ============ Over-Activation 训练中评估 ============
eval_overactivation: True
negative_img_dir: "../coco/images/negative_samples"
oa_conf_threshold: 0.3
oa_ap_tolerance: 0.005  # stg2 AP下降≤0.5%时，若OA改善则保存best_oa.pth跳过rollback

# ============ Train dataloader ============
train_dataloader:
  collate_fn:
    base_size: 640
    base_size_repeat: 10
    stop_epoch: 56
    ema_restart_decay: 0.9999
    type: BatchImageCollateFunction
  dataset:
    img_folder: ../coco/images
    ann_file: ../coco/converted/annotations/train_with_negatives.json
    return_masks: False
    transforms:
      type: Compose
      ops:
        - type: RandomPhotometricDistort
          p: 0.5
        - type: RandomZoomOut
          fill: 0
        - type: RandomIoUCrop
          p: 0.8
        - type: SanitizeBoundingBoxes
          min_size: 1
        - type: RandomHorizontalFlip
        - type: Resize
          size: [640, 640]
        - type: SanitizeBoundingBoxes
          min_size: 1
        - type: ConvertPILImage
          dtype: float32
          scale: True
        - type: ConvertBoxes
          fmt: cxcywh
          normalize: True
      policy:
        name: stop_epoch
        epoch: 56
        ops: [RandomPhotometricDistort, RandomZoomOut, RandomIoUCrop]
    type: CocoDetection
  drop_last: True
  num_workers: 36
  shuffle: True
  total_batch_size: 32
  type: DataLoader

val_dataloader:
  collate_fn:
    type: BatchImageCollateFunction
  dataset:
    img_folder: ../coco/images
    ann_file: ../coco/converted/annotations/val.json
    return_masks: False
    # 验证集使用最小增强
    transforms:
      type: Compose
      ops:
        - type: Resize
          size: [640, 640]
        - type: ConvertPILImage
          dtype: float32
          scale: True
        - type: ConvertBoxes
          fmt: cxcywh
          normalize: True
    type: CocoDetection
  drop_last: False
  num_workers: 12
  shuffle: False
  total_batch_size: 64
  type: DataLoader

# 每 N 轮额外保存一次 checkpointxxxx.pth（last/best 仍会按训练逻辑保存）
checkpoint_freq: 12
epochs: 160

lr_warmup_scheduler:
  type: LinearWarmup
  warmup_duration: 500

ema:
  type: ModelEMA
  decay: 0.9999
  start: 0
  warmups: 2000

clip_max_norm: 0.1
sync_bn: False
