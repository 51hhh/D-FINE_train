# 单目标 volleyball：S 模型平衡方案（精度/速度平衡）
# 说明：
# 1) 使用 S 架构 + 迁移训练，通常比 N 更稳
# 2) 推荐搭配 -t weights/dfine_s_obj365.pth
# 用法（在 D-FINE 目录下）：
# python train.py -c ../config/volleyball_s_transfer_balance.yml --use-amp --seed 0 -t weights/dfine_s_obj365.pth

__include__: [
  '../D-FINE/configs/dfine/custom/objects365/dfine_hgnetv2_s_obj2custom.yml',
]

output_dir: ./output/exp_s_transfer_balance

num_classes: 1
remap_mscoco_category: False

# 适当延长训练轮次，给小数据集更多收敛空间
epochs: 96
checkpoint_freq: 5

# 保持 640 输入，保证小目标稳定性
eval_spatial_size: [640, 640]

train_dataloader:
  dataset:
    img_folder: C:/Users/Rick/Desktop/python/ObjectDetection/coco/images
    ann_file: C:/Users/Rick/Desktop/python/ObjectDetection/coco/converted/annotations/train.json

val_dataloader:
  dataset:
    img_folder: C:/Users/Rick/Desktop/python/ObjectDetection/coco/images
    ann_file: C:/Users/Rick/Desktop/python/ObjectDetection/coco/converted/annotations/val.json
