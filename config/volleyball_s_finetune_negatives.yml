# 困难负样本微调配置：基于 best_stg1.pth 继续训练
# 用法：python train.py -c ../config/volleyball_s_finetune_negatives.yml --use-amp --seed 0 -r output/exp_s_transfer_aug/best_stg1.pth

__include__: [
  '../D-FINE/configs/dfine/custom/objects365/dfine_hgnetv2_s_obj2custom.yml',
]

# 新的输出目录
output_dir: ./output/exp_s_finetune_neg

# 数据集设置
num_classes: 1
remap_mscoco_category: False

# ============ 使用带负样本的训练集 ============
train_dataloader:
  collate_fn:
    base_size: 640
    base_size_repeat: 10
    stop_epoch: 30  # 微调轮次较少
    ema_restart_decay: 0.9999
    type: BatchImageCollateFunction
  dataset:
    img_folder: ../coco/images
    # 使用包含负样本的训练集
    ann_file: ../coco/converted/annotations/train_with_negatives.json
    return_masks: False
    transforms:
      type: Compose
      ops:
        - type: RandomPhotometricDistort
          p: 0.5  # 微调时降低增强强度
        - type: RandomIoUCrop
          p: 0.5
        - type: SanitizeBoundingBoxes
          min_size: 1
        - type: RandomHorizontalFlip
          p: 0.5
        - type: Resize
          size: [640, 640]
        - type: SanitizeBoundingBoxes
          min_size: 1
        - type: ConvertPILImage
          dtype: float32
          scale: True
        - type: ConvertBoxes
          fmt: cxcywh
          normalize: True
      policy:
        name: stop_epoch
        epoch: 30
        ops: [RandomPhotometricDistort, RandomIoUCrop]
    type: CocoDetection
  drop_last: True
  num_workers: 4
  shuffle: True
  total_batch_size: 32
  type: DataLoader

val_dataloader:
  collate_fn:
    type: BatchImageCollateFunction
  dataset:
    img_folder: ../coco/images
    ann_file: ../coco/converted/annotations/val.json
    return_masks: False
    transforms:
      type: Compose
      ops:
        - type: Resize
          size: [640, 640]
        - type: ConvertPILImage
          dtype: float32
          scale: True
        - type: ConvertBoxes
          fmt: cxcywh
          normalize: True
    type: CocoDetection
  drop_last: False
  num_workers: 4
  shuffle: False
  total_batch_size: 64
  type: DataLoader

# 微调参数
checkpoint_freq: 3
epochs: 30  # 微调不需要太多轮

# 更小的学习率用于微调
optimizer:
  type: AdamW
  lr: 0.00005  # 降低5倍
  betas: [0.9, 0.999]
  weight_decay: 0.000125
  params:
    - params: '^(?=.*backbone)(?!.*norm|bn).*$'
      lr: 0.000025  # backbone 更小
    - params: '^(?=.*backbone)(?=.*norm|bn).*$'
      lr: 0.000025
      weight_decay: 0.0
    - params: '^(?=.*(?:encoder|decoder))(?=.*(?:norm|bn|bias)).*$'
      weight_decay: 0.0

lr_warmup_scheduler:
  type: LinearWarmup
  warmup_duration: 100  # 短预热

clip_max_norm: 0.1
sync_bn: False
