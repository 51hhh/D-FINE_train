# obj2coco pretrained, A+D + num_queries=100 + freeze backbone
# 在 neg_d 基线上叠加：减少 query 数量 + 冻结 backbone
# 用法（在 D-FINE 目录下执行）：
# python train.py -c ../config/volleyball_s_obj2coco_neg_d_q100_freeze.yml --use-amp --seed 0 -t weights/dfine_s_obj2coco.pth

__include__: [
  '../D-FINE/configs/dfine/custom/objects365/dfine_hgnetv2_s_obj2custom.yml',
]

output_dir: ./output/exp_s_obj2coco_neg_d_q100_freeze

num_classes: 1
remap_mscoco_category: False

# ============ Method D + 减少 queries ============
DFINETransformer:
  num_neg_random: 50
  neg_iou_threshold: 0.3
  num_queries: 100        # 300→100，减少过激活槽位

DFINEPostProcessor:
  num_top_queries: 100    # 必须 <= num_queries

# ============ 冻结 backbone ============
HGNetv2:
  freeze_at: 3            # 冻结全部 backbone stage，保留 COCO 特征多样性
  freeze_norm: True       # BN 层也冻结，使用预训练的统计量

# ============ Train dataloader ============
train_dataloader:
  collate_fn:
    base_size: 640
    base_size_repeat: 10
    stop_epoch: 56
    ema_restart_decay: 0.9999
    type: BatchImageCollateFunction
  dataset:
    img_folder: ../coco/images
    ann_file: ../coco/converted/annotations/train_with_negatives.json
    return_masks: False
    transforms:
      type: Compose
      ops:
        - type: RandomPhotometricDistort
          p: 0.5
        - type: RandomZoomOut
          fill: 0
        - type: RandomIoUCrop
          p: 0.8
        - type: SanitizeBoundingBoxes
          min_size: 1
        - type: RandomHorizontalFlip
        - type: Resize
          size: [640, 640]
        - type: SanitizeBoundingBoxes
          min_size: 1
        - type: ConvertPILImage
          dtype: float32
          scale: True
        - type: ConvertBoxes
          fmt: cxcywh
          normalize: True
      policy:
        name: stop_epoch
        epoch: 56
        ops: [RandomPhotometricDistort, RandomZoomOut, RandomIoUCrop]
    type: CocoDetection
  drop_last: True
  num_workers: 36
  shuffle: True
  total_batch_size: 32
  type: DataLoader

val_dataloader:
  collate_fn:
    type: BatchImageCollateFunction
  dataset:
    img_folder: ../coco/images
    ann_file: ../coco/converted/annotations/val.json
    return_masks: False
    transforms:
      type: Compose
      ops:
        - type: Resize
          size: [640, 640]
        - type: ConvertPILImage
          dtype: float32
          scale: True
        - type: ConvertBoxes
          fmt: cxcywh
          normalize: True
    type: CocoDetection
  drop_last: False
  num_workers: 12
  shuffle: False
  total_batch_size: 64
  type: DataLoader

checkpoint_freq: 12
epochs: 160

lr_warmup_scheduler:
  type: LinearWarmup
  warmup_duration: 500

ema:
  type: ModelEMA
  decay: 0.9999
  start: 0
  warmups: 2000

clip_max_norm: 0.1
sync_bn: False
